
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coherence — Reasoning System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              mono: ['JetBrains Mono', 'monospace'],
              sans: ['IBM Plex Sans', 'sans-serif'],
            },
          }
        }
      }
    </script>
    <style>
        :root {
            --bg-color: #f0eee6;
            --panel-bg: #e8e6de;
            --border-color: #c0beb0;
            --border-strong: #2a2a24;
            --text-main: #2a2a24;
            --text-dim: #7a786a;
            --accent-green: #4ade80;
            --accent-amber: #fbbf24;
            --grid-color: rgba(192, 190, 176, 0.15);
        }

        .dark {
            --bg-color: #121210;
            --panel-bg: #1a1a16;
            --border-color: #33322e;
            --border-strong: #d1d1c1;
            --text-main: #d1d1c1;
            --text-dim: #908e7e;
            --grid-color: rgba(255, 255, 255, 0.03);
        }

        body {
            font-family: 'IBM Plex Sans', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            overflow-x: hidden;
            background-image:
                radial-gradient(circle at center, transparent 0%, rgba(0,0,0,0.03) 100%),
                linear-gradient(var(--grid-color) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
            background-size: 100% 100%, 30px 30px, 30px 30px;
            position: relative;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        body::after {
            content: " ";
            display: block;
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.05) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.01), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.01));
            z-index: 1000;
            background-size: 100% 3px, 3px 100%;
            pointer-events: none;
        }

        body::before {
            content: " ";
            display: block;
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            background: radial-gradient(circle at center, transparent 60%, rgba(0,0,0,0.05) 100%);
            z-index: 1001;
            pointer-events: none;
        }

        .mono { font-family: 'JetBrains Mono', monospace; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .retro-card {
            background: rgba(255, 255, 255, 0.95);
            border: 1.5px solid var(--border-color);
            box-shadow: 3px 3px 0px var(--border-color);
            transition: all 0.15s ease;
        }
        .retro-card:hover {
            box-shadow: 4px 4px 0px var(--border-strong);
            border-color: var(--border-strong);
        }
        .dark .retro-card {
            background: rgba(20, 20, 18, 0.95);
            box-shadow: 3px 3px 0px var(--border-color);
        }

        /* Bolder scrollbar */
        ::-webkit-scrollbar { width: 3px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border-color); }

        @keyframes phosphor-glow {
            0% { text-shadow: 0 0 2px rgba(0,0,0,0.15); }
            50% { text-shadow: 0 0 6px rgba(0,0,0,0.3); }
            100% { text-shadow: 0 0 2px rgba(0,0,0,0.15); }
        }
        .glow-text {
            animation: phosphor-glow 4s infinite ease-in-out;
        }
        .dark .glow-text {
            text-shadow: 0 0 12px rgba(225, 225, 209, 0.4);
        }

        /* Stronger focus states */
        input:focus, textarea:focus {
            outline: 2px solid var(--border-strong) !important;
            outline-offset: 0px;
        }
    </style>
</head>
<body class="antialiased">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
</body>
</html>
